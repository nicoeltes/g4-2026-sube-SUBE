<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SUBE registrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script defer src="main.js"></script>
  </head>
  <body>
    <header><img src="img/logo_sube.svg" alt="logo sube" /></header>
    <h1 class="lora-bold">Cuadro Tarifario</h1>
    <form class="montserrat-regular">
      <label for="registrada">¿La tarjeta SUBE está registrada?</label>
      <select class="montserrat-regular" id="registrada">
        <option value="si">Sí</option>
        <option value="no">No</option>
        <option value="tarifa social">tarifa social</option>
      </select>
      <label for="distancia">Km a recorrer</label>
      <input
        class="montserrat-regular"
        type="number"
        min="0"
        id="distancia"
        placeholder="Ingrese los km"
      />
      <div class="boton montserrat-regular" id="boton">Calcular tarifa</div>
    </form>
    <p class="resultado montserrat-regular" id="tarifa">(Tarifa)</p>
  </body>
</html>
